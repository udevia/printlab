version: '3.8'

services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: printlab_user
      POSTGRES_PASSWORD: printlab_password_secure
      POSTGRES_DB: printlab_db
    ports:
      - "5432:5432"
    volumes:
      - printlab_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U printlab_user -d printlab_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://printlab_user:printlab_password_secure@db:5432/printlab_db?schema=public
      - NODE_ENV=production
    volumes:
      - printlab_uploads:/app/public/uploads
    depends_on:
      db:
        condition: service_healthy

volumes:
  printlab_postgres_data:
  printlab_uploads:
